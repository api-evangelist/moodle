  idnumber: String
  lang: String
  timezone: String
  description: String
  profileImageUrl: String
  profileImageUrlSmall: String
  suspended: Boolean
  confirmed: Boolean
  auth: String
  lastLogin: DateTime
  firstAccess: DateTime
  lastAccess: DateTime
  created: DateTime
  modified: DateTime
  roles: [Role!]
  preferences: [UserPreference!]
  customFields: [CustomField!]
  enrollments: [Enrollment!]
  groups: [Group!]
  badges: [IssuedBadge!]
}

type UserPreference {
  name: String!
  value: String
}

type UserConnection {
  nodes: [User!]!
