"""
Moodle GraphQL Schema
Conceptual schema derived from Moodle REST API (moodledev.io/docs/apis/subsystems/external/)
Covers: courses, users, enrollments, grades, assignments, quizzes, forums,
        resources, activities, calendar events, badges, and completion tracking.
"""

schema {
  query: Query
  mutation: Mutation
}

# ---------------------------------------------------------------------------
# Root Query
# ---------------------------------------------------------------------------

type Query {
  # Users
  user(id: ID!): User
  users(filters: UserFilter, limit: Int, offset: Int): UserConnection

  # Courses
  course(id: ID!): Course
  courses(filters: CourseFilter, limit: Int, offset: Int): CourseConnection
  coursesByField(field: String!, value: String!): [Course!]

  # Enrollments
  enrollment(id: ID!): Enrollment
  enrollmentsByCourse(courseId: ID!): [Enrollment!]
  enrollmentsByUser(userId: ID!): [Enrollment!]

  # Grades
  gradeItem(id: ID!): GradeItem
  gradeItems(courseId: ID!): [GradeItem!]
  gradeReport(courseId: ID!, userId: ID!): GradeReport

  # Assignments
  assignment(id: ID!): Assignment
  assignmentsByCourse(courseId: ID!): [Assignment!]
  assignmentSubmission(assignmentId: ID!, userId: ID!): AssignmentSubmission
  assignmentSubmissions(assignmentId: ID!): [AssignmentSubmission!]

  # Quizzes
  quiz(id: ID!): Quiz
  quizzesByCourse(courseId: ID!): [Quiz!]
  quizAttempt(id: ID!): QuizAttempt
  quizAttemptsByUser(quizId: ID!, userId: ID!): [QuizAttempt!]

  # Forums
  forum(id: ID!): Forum
  forumsByCourse(courseId: ID!): [Forum!]
  forumDiscussion(id: ID!): ForumDiscussion
  forumDiscussions(forumId: ID!, limit: Int, offset: Int): ForumDiscussionConnection
  forumPost(id: ID!): ForumPost
  forumPosts(discussionId: ID!): [ForumPost!]

  # Resources / Activities
  courseModule(id: ID!): CourseModule
  courseModules(courseId: ID!, modname: String): [CourseModule!]
  courseSection(id: ID!): CourseSection
  courseSections(courseId: ID!): [CourseSection!]

  # Calendar Events
  calendarEvent(id: ID!): CalendarEvent
  calendarEvents(filters: CalendarEventFilter): [CalendarEvent!]

  # Badges
  badge(id: ID!): Badge
  badges(courseId: ID): [Badge!]
  userBadges(userId: ID!): [IssuedBadge!]

  # Completion
  completionStatus(courseId: ID!, userId: ID!): CompletionStatus
  activityCompletions(courseId: ID!, userId: ID!): [ActivityCompletion!]

  # Site Info
  siteInfo: SiteInfo

  # Cohorts
  cohort(id: ID!): Cohort
  cohorts(limit: Int, offset: Int): CohortConnection

  # Roles
  role(id: ID!): Role
  roles: [Role!]

  # Files
  files(contextId: ID!, component: String!, fileArea: String!): [MoodleFile!]

  # Messages
  message(id: ID!): Message
  conversations(userId: ID!, limit: Int, offset: Int): ConversationConnection

  # Notifications
  notifications(userId: ID!, limit: Int, offset: Int): NotificationConnection

  # Tags
  tag(id: ID!): Tag
  tags(limit: Int, offset: Int): [Tag!]

  # Competencies
  competency(id: ID!): Competency
  competencies(frameworkId: ID!): [Competency!]
  competencyFramework(id: ID!): CompetencyFramework
  competencyFrameworks: [CompetencyFramework!]

  # Groups
  group(id: ID!): Group
  groupsByCourse(courseId: ID!): [Group!]
  grouping(id: ID!): Grouping
  groupingsByCourse(courseId: ID!): [Grouping!]
}

# ---------------------------------------------------------------------------
# Root Mutation
# ---------------------------------------------------------------------------

type Mutation {
  # Users
  createUser(input: CreateUserInput!): User
  updateUser(id: ID!, input: UpdateUserInput!): User
  deleteUser(id: ID!): Boolean
  suspendUser(id: ID!): User

  # Courses
  createCourse(input: CreateCourseInput!): Course
  updateCourse(id: ID!, input: UpdateCourseInput!): Course
  deleteCourse(id: ID!): Boolean
  duplicateCourse(id: ID!): Course

  # Enrollments
  enrollUser(input: EnrollUserInput!): Enrollment
  unenrollUser(courseId: ID!, userId: ID!, roleId: ID): Boolean

  # Grades
  updateGrade(input: UpdateGradeInput!): GradeItem

  # Assignments
  submitAssignment(input: SubmitAssignmentInput!): AssignmentSubmission
  gradeAssignment(input: GradeAssignmentInput!): AssignmentGrade

  # Forums
  createForumDiscussion(input: CreateForumDiscussionInput!): ForumDiscussion
  replyToForumPost(input: ReplyToForumPostInput!): ForumPost
  deleteForumPost(id: ID!): Boolean

  # Calendar Events
  createCalendarEvent(input: CreateCalendarEventInput!): CalendarEvent
  updateCalendarEvent(id: ID!, input: UpdateCalendarEventInput!): CalendarEvent
  deleteCalendarEvent(id: ID!): Boolean

  # Completion
  markActivityComplete(courseId: ID!, cmId: ID!, userId: ID!): ActivityCompletion
  markCourseComplete(courseId: ID!, userId: ID!): CompletionStatus

  # Messages
  sendMessage(input: SendMessageInput!): Message

  # Groups
  createGroup(input: CreateGroupInput!): Group
  addUserToGroup(groupId: ID!, userId: ID!): Boolean
  removeUserFromGroup(groupId: ID!, userId: ID!): Boolean

  # Cohorts
  createCohort(input: CreateCohortInput!): Cohort
  addUserToCohort(cohortId: ID!, userId: ID!): Boolean
  removeUserFromCohort(cohortId: ID!, userId: ID!): Boolean

  # Badges
  issueBadge(badgeId: ID!, userId: ID!): IssuedBadge
  revokeBadge(issuedBadgeId: ID!): Boolean
}

